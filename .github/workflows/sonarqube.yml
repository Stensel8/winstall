on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]

name: Sonarqube SAST Scan
jobs:
  sonarqube:
    runs-on: self-hosted
    env:
      SONAR_SCANNER_VERSION: ${{ vars.SONAR_SCANNER_VERSION || '11' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: SAST SonarQube Scan
        run: |
          set -euo pipefail
          # github.workspace 在宿主机 socket 方案下应为 /data/actions-runner/_work/<org>/<repo>
          # 该路径在宿主机上必须真实存在（由 compose bind mount 保证）
          echo "Workspace: ${{ github.workspace }}"
          ls -la "${{ github.workspace }}" | head -20

          USER_ID=$(id -u)
          GROUP_ID=$(id -g)
          docker run --rm \
            -v "${{ github.workspace }}:/usr/src" \
            -w /usr/src \
            --user "${USER_ID}:${GROUP_ID}" \
            -e SONAR_USER_HOME=/tmp/sonar-cache \
            "sonarsource/sonar-scanner-cli:${SONAR_SCANNER_VERSION}" \
            sonar-scanner \
              -Dsonar.projectKey=${{ github.event.repository.name }} \
              -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
              -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.sources=. \
              -Dsonar.projectVersion=${{ github.ref_name }} \
              -Dsonar.exclusions="${{ vars.SONAR_EXCLUSIONS }}" \
              -Dsonar.qualitygate.wait=true \
              -Dsonar.working.directory=/tmp/sonar-work \
              -Dsonar.sarifReportPaths=result.sarif \
              -X

      - name: Upload report-task.txt
        uses: actions/upload-artifact@v7
        with:
          name: sonarqube-report
          path: |
            *.sarif
            report-*.txt
          retention-days: 3
 
