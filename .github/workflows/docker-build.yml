name: Build and Push Multi-stage Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/winstall
          tags: |
            type=raw,value=app-latest
            type=semver,pattern=app-{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_WINGET_API_BASE=${{ secrets.NEXT_PUBLIC_WINGET_API_BASE }}
            NEXT_PUBLIC_WINGET_API_KEY=${{ secrets.NEXT_PUBLIC_WINGET_API_KEY }}
            NEXT_PUBLIC_WINGET_API_SECRET=${{ secrets.NEXT_PUBLIC_WINGET_API_SECRET }}
            NEXT_PUBLIC_TWITTER_BEARER=${{ secrets.NEXT_PUBLIC_TWITTER_BEARER }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
