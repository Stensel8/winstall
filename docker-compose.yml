version: '3.8'

services:
  winstall:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WINGET_API_BASE: ${NEXT_PUBLIC_WINGET_API_BASE}
        NEXT_PUBLIC_WINGET_API_KEY: ${NEXT_PUBLIC_WINGET_API_KEY}
        NEXT_PUBLIC_WINGET_API_SECRET: ${NEXT_PUBLIC_WINGET_API_SECRET}
        NEXT_PUBLIC_TWITTER_BEARER: ${NEXT_PUBLIC_TWITTER_BEARER}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: winstall-app:latest
    container_name: winstall
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Runtime environment variables (for NextAuth, etc.)
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - TWITTER_ID=${TWITTER_ID}
      - TWITTER_SECRET=${TWITTER_SECRET}
      # Build-time vars need to be passed again for runtime
      - NEXT_PUBLIC_WINGET_API_BASE=${NEXT_PUBLIC_WINGET_API_BASE}
      - NEXT_PUBLIC_WINGET_API_KEY=${NEXT_PUBLIC_WINGET_API_KEY}
      - NEXT_PUBLIC_WINGET_API_SECRET=${NEXT_PUBLIC_WINGET_API_SECRET}
      - NEXT_PUBLIC_TWITTER_BEARER=${NEXT_PUBLIC_TWITTER_BEARER}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - winstall-network

networks:
  winstall-network:
    driver: bridge
