services:
  winstall:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${WINSTALL_APP_TAG:-winstall/app-latest}
    container_name: winstall
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - TWITTER_ID=${TWITTER_ID}
      - TWITTER_SECRET=${TWITTER_SECRET}
      - TWITTER_BEARER=${TWITTER_BEARER}
      - WINSTALL_API_BASE=${WINSTALL_API_BASE}
      - WINSTALL_API_KEY=${WINSTALL_API_KEY}
      - WINSTALL_API_SECRET=${WINSTALL_API_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - winstall-network

networks:
  winstall-network:
    driver: bridge
