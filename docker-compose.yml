services:
  winstall:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${WINSTALL_APP_TAG:-winstall/app-latest}
    container_name: winstall-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - MONGODB_URI=${MONGODB_URI}
      - TWITTER_ID=${TWITTER_ID}
      - TWITTER_SECRET=${TWITTER_SECRET}
      - TWITTER_BEARER=${TWITTER_BEARER}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - WINSTALL_API_BASE=${WINSTALL_API_BASE}
      - WINSTALL_API_KEY=${WINSTALL_API_KEY}
      - WINSTALL_API_SECRET=${WINSTALL_API_SECRET}
      - NEXT_PUBLIC_WINSTALL_API_BASE=${NEXT_PUBLIC_WINSTALL_API_BASE}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
